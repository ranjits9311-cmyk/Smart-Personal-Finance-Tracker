<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinancePro | Master Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Finance<span class="bold">Pro</span></h1>
            <div class="balance-card">
                <small>Current Balance</small>
                <h2 id="balance">$0.00</h2>
            </div>
        </header>

        <section class="summary">
            <div class="summary-card income">
                <small>Income</small>
                <div id="income">$0.00</div>
            </div>
            <div class="summary-card expense">
                <small>Expenses</small>
                <div id="expense">$0.00</div>
            </div>
        </section>

        <section class="form-container">
            <h3>Add Transaction</h3>
            <form id="tx-form" class="input-group" autocomplete="off">
                <input type="text" id="text" placeholder="Description (e.g. Salary, Rent)" required maxlength="60">
                <div class="row">
                    <input type="number" id="amount" placeholder="Amount" step="0.01" required>
                    <select id="type" aria-label="Type">
                        <option value="expense" selected>Expense (-)</option>
                        <option value="income">Income (+)</option>
                    </select>
                </div>
                <select id="category" aria-label="Category">
                    <option value="Income">Income</option>
                    <option value="Rent">Rent</option>
                    <option value="Groceries">Groceries</option>
                    <option value="Utilities">Utilities</option>
                    <option value="Transport">Transport</option>
                    <option value="Dining">Dining</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Health">Health</option>
                    <option value="Other" selected>Other</option>
                </select>
                <input type="date" id="date">
                <button class="btn" type="submit">Add Entry</button>
            </form>
            <div class="actions">
                <button class="btn secondary" id="exportCsv" type="button">Export CSV</button>
                <button class="btn danger" id="clearAll" type="button">Clear All</button>
            </div>
        </section>

        <section class="history">
            <div class="history-head">
                <h3>Transaction History</h3>
                <input id="search" type="search" placeholder="Search transactions…" aria-label="Search transactions">
            </div>
            <ul id="list" class="list"></ul>
            <p id="empty" class="empty">No transactions yet.</p>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
